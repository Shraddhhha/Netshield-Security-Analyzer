<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NETSHIELD Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #182848, #4b6cb7);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            width: 450px;
            text-align: center;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 20px;
            font-size: 28px;
            font-weight: bold;
        }

        input[type="file"] {
            padding: 12px;
            margin: 20px 0;
            width: 100%;
            border-radius: 10px;
            border: none;
        }

        button {
            background: #00c6ff;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            color: black;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #00a2d4;
        }
        
        .footer {
            margin-top: 20px;
            font-size: 13px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>NETSHIELD Security Dashboard</h1>
        <p>Upload your network logs for cyberattack analysis</p>
        <form action="/scan" method="post" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <button type="submit">Scan Logs</button>
        </form>

        <div class="footer">Developed as Mini Project • CSE(DS)</div>
    </div>

</body>
</html>
